- name: Ubuntu Maintenance Collection - Upgrade packages and reboot if needed and allowed
  gather_facts: true
  hosts: all

  tasks:
    - name: Ensure that required variables are defined outside Jinja
      ansible.builtin.import_role:
        name: bartmichu.ubuntu_maintenance._umc_validate_globals
      become: false
      tags: always

    - name: Gather the package facts
      ansible.builtin.package_facts:
        manager: apt
      become: false

    - name: Run umc_packages_update_cache role
      ansible.builtin.include_role:
        name: umc_packages_update_cache

    - name: Run umc_packages_needrestart role
      when: "'needrestart' not in ansible_facts.packages"
      ansible.builtin.include_role:
        name: umc_packages_needrestart

    - name: Run umc_packages_upgrade_check role
      ansible.builtin.include_role:
        name: umc_packages_upgrade_check

    - name: Display available package upgrades
      when: ((_umc_global_upgradeable_packages_all | default([])) | length > 0) or ((_umc_global_upgradeable_packages_security | default([])) | length > 0)
      ansible.builtin.debug:
        msg:
          "{% if (_umc_global_upgradeable_packages_security | length > 0) %}PENDING SECURITY UPGRADES: {{ _umc_global_upgradeable_packages_security | length }} ({{ _umc_global_upgradeable_packages_security | join(', ') }}). {% endif %}\
          {% if (_umc_global_upgradeable_packages_all | length > 0) %}PENDING UPGRADES: {{ _umc_global_upgradeable_packages_all | length }} ({{ _umc_global_upgradeable_packages_all | join(', ') }}). {% endif %}"
      become: false

    - name: Run umc_packages_upgrade_all role
      when: (_umc_global_upgradeable_packages_all | length > 0) or ((_umc_global_upgradeable_packages_security | default([])) | length > 0)
      ansible.builtin.include_role:
        name: umc_packages_upgrade_all

    - name: Run umc_system_reboot_check role
      ansible.builtin.include_role:
        name: umc_system_reboot_check

    - name: Run umc_services_restart_check role
      ansible.builtin.include_role:
        name: umc_services_restart_check

    - name: Display list of services that need to be restarted
      when: _umc_global_services_to_restart | length > 0
      ansible.builtin.debug:
        msg: "SERVICES TO RESTART: {{ _umc_global_services_to_restart | length }} ({{ _umc_global_services_to_restart | join(', ') }})"
      become: false

    - name: Display upgrade and restart summary
      when: ((_umc_global_upgradeable_packages_all | default([])) | length > 0)
        or ((_umc_global_services_to_restart | length) > 0)
        or (_umc_global_reboot_needed | default(false))
      ansible.builtin.debug:
        msg:
          "PACKAGES: {{ _umc_global_upgrade_summary | default('NONE UPGRADED.') }} \
          {% if (_umc_global_services_to_restart | length > 0) %}SERVICES TO RESTART: {{ _umc_global_services_to_restart | length }} ({{ _umc_global_services_to_restart | join(', ') }}). {% endif %}\
          {% if _umc_global_reboot_needed %}REBOOT IS NEEDED {{ 'AND ALLOWED' if umc_global_allow_reboot else 'BUT NOT ALLOWED' }}. {% endif %}\
          {% if (not _umc_global_reboot_needed and (umc_global_services_require_reboot and (_umc_global_services_to_restart | length > 0))) %}REBOOT IS NEEDED {{ 'AND ALLOWED' if umc_global_allow_reboot else 'BUT NOT ALLOWED' }}.{% endif %}"
      become: false

    - name: Announce system reboot requirement
      when: (_umc_global_reboot_needed | default(false))
        or ((umc_global_services_require_reboot | default(false)) and ((_umc_global_services_to_restart | default([])) | length > 0))
      ansible.builtin.debug:
        msg: "SYSTEM REBOOT IS NEEDED{{ ' BUT NOT ALLOWED' if umc_global_allow_reboot == false }}"
      become: false

    - name: Reboot block
      when:
        ((_umc_global_reboot_needed | default(false)) or ((umc_global_services_require_reboot | default(false)) and ((_umc_global_services_to_restart | default([])) | length > 0)))
        and umc_global_allow_reboot
      block:
        - name: Run umc_system_reboot role
          ansible.builtin.include_role:
            name: umc_system_reboot

        - name: Confirm successful system reboot
          ansible.builtin.debug:
            msg: "SYSTEM WAS SUCCESSFULLY REBOOTED"
          become: false
          failed_when: not (_umc_global_reboot_successfull | default(false))
