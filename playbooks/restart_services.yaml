- name: Ubuntu Maintenance Collection - Restart services
  gather_facts: true
  hosts: all

  tasks:
    - name: Ensure that required variables are defined outside Jinja
      ansible.builtin.import_role:
        name: bartmichu.ubuntu_maintenance._umc_validate_globals
      become: false
      tags: always

    - name: Gather the package facts
      ansible.builtin.package_facts:
        manager: apt
      become: false

    - name: Installation block
      when: "'needrestart' not in ansible_facts.packages"
      block:
        - name: Run umc_packages_update_cache role
          ansible.builtin.include_role:
            name: umc_packages_update_cache

        - name: Run umc_packages_needrestart role
          ansible.builtin.include_role:
            name: umc_packages_needrestart

    - name: Run umc_services_restart_check role
      ansible.builtin.include_role:
        name: umc_services_restart_check

    - name: Store initial list of services needing restart
      ansible.builtin.set_fact:
        _umc_global_needrestart_first_check: "{{ _umc_global_services_to_restart }}"
      become: false

    - name: Display services that need to be restarted
      when: _umc_global_needrestart_first_check | length > 0
      ansible.builtin.debug:
        msg: "SERVICES TO RESTART: {{ _umc_global_needrestart_first_check | length }} ({{ _umc_global_needrestart_first_check | join(', ') }})"
      become: false

    - name: Run umc_services_restart role
      when: (umc_global_allow_services_restart | default(false)) and (_umc_global_needrestart_first_check | length > 0)
      ansible.builtin.include_role:
        name: umc_services_restart
        public: true

    - name: Run umc_services_restart_check role
      when: _umc_global_needrestart_first_check | length > 0
      ansible.builtin.include_role:
        name: umc_services_restart_check

    - name: Store updated list of services still needing restart
      when: _umc_global_needrestart_first_check | length > 0
      ansible.builtin.set_fact:
        _umc_global_needrestart_second_check: "{{ _umc_global_services_to_restart }}"
      become: false

    - name: Display services that were not restarted
      when: (_umc_global_needrestart_second_check | default([])) | length > 0
      ansible.builtin.debug:
        msg: "SERVICES STILL TO RESTART: {{ _umc_global_needrestart_second_check | length }} ({{ _umc_global_needrestart_second_check | join(', ') }})"
      become: false

    - name: Display restart summary
      when: _umc_global_needrestart_first_check | length > 0
      ansible.builtin.debug:
        msg:
          "RESTARTED SERVICES: {{ ((_umc_global_needrestart_first_check | length) - (_umc_global_needrestart_second_check | length)) if umc_global_allow_services_restart else 0 }}
          / {{ _umc_global_needrestart_first_check | length }}{{ ' (NOT ALLOWED)' if umc_global_allow_services_restart == false else '' }}"
      become: false
